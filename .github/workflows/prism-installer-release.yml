name: Build Prism Installer (Tauri)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.5.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Job 1: Build CLI binaries, VSIX, and plugin files ───────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/prism-cli/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [[ "$VERSION" == refs/* ]]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure go.sum is up to date
        run: cd apps/prism-cli && go mod tidy

      - name: Build prism-cli for Windows (amd64)
        run: |
          cd apps/prism-cli
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }}" \
            -o ../../artifacts/cli/windows-amd64/prism-cli.exe .

      - name: Build prism-cli for macOS (amd64)
        run: |
          cd apps/prism-cli
          GOOS=darwin GOARCH=amd64 go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }}" \
            -o ../../artifacts/cli/macos-amd64/prism-cli .

      - name: Build prism-cli for macOS (arm64)
        run: |
          cd apps/prism-cli
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-X main.version=${{ steps.ver.outputs.version }}" \
            -o ../../artifacts/cli/macos-arm64/prism-cli .

      - name: Build VSIX extension
        run: |
          cd apps/prism-vscode
          npm ci
          npx @vscode/vsce package \
            --no-dependencies \
            --baseContentUrl https://github.com/TheDigitalGriot/prism-plugin/tree/main/apps/prism-vscode \
            --baseImagesUrl https://github.com/TheDigitalGriot/prism-plugin/raw/main/apps/prism-vscode \
            --out ../../artifacts/extensions/prism-${{ steps.ver.outputs.version }}.vsix
        continue-on-error: true

      - name: Copy plugin files
        run: |
          mkdir -p artifacts/plugin
          cp -r commands artifacts/plugin/
          cp -r agents artifacts/plugin/

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

  # ─── Job 2: Build Windows NSIS installer ─────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Stage resources for Tauri
        shell: bash
        run: |
          mkdir -p apps/prism-installer/src-tauri/resources/bin
          mkdir -p apps/prism-installer/src-tauri/resources/extensions
          mkdir -p apps/prism-installer/src-tauri/resources/plugin
          cp artifacts/cli/windows-amd64/prism-cli.exe \
            apps/prism-installer/src-tauri/resources/bin/prism-cli-x86_64-pc-windows-msvc.exe
          if ls artifacts/extensions/*.vsix 2>/dev/null; then
            cp artifacts/extensions/*.vsix \
              apps/prism-installer/src-tauri/resources/extensions/
          fi
          cp -r artifacts/plugin/* \
            apps/prism-installer/src-tauri/resources/plugin/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/prism-installer
        run: npm ci

      - name: Build Tauri installer (Windows NSIS)
        working-directory: apps/prism-installer
        run: npm run tauri build -- --bundles nsis
        env:
          PRISM_VERSION: ${{ needs.prepare.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: prism-installer-windows
          path: apps/prism-installer/src-tauri/target/release/bundle/nsis/*.exe

  # ─── Job 3: Build macOS DMG installer ────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/

      - name: Stage resources for Tauri
        run: |
          mkdir -p apps/prism-installer/src-tauri/resources/bin
          mkdir -p apps/prism-installer/src-tauri/resources/extensions
          mkdir -p apps/prism-installer/src-tauri/resources/plugin
          cp artifacts/cli/macos-arm64/prism-cli \
            apps/prism-installer/src-tauri/resources/bin/prism-cli-aarch64-apple-darwin
          cp artifacts/cli/macos-amd64/prism-cli \
            apps/prism-installer/src-tauri/resources/bin/prism-cli-x86_64-apple-darwin
          if ls artifacts/extensions/*.vsix 2>/dev/null; then
            cp artifacts/extensions/*.vsix \
              apps/prism-installer/src-tauri/resources/extensions/
          fi
          cp -r artifacts/plugin/* \
            apps/prism-installer/src-tauri/resources/plugin/

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: apps/prism-installer
        run: npm ci

      - name: Build Tauri installer (macOS DMG)
        working-directory: apps/prism-installer
        run: npm run tauri build -- --bundles dmg
        env:
          PRISM_VERSION: ${{ needs.prepare.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: prism-installer-macos
          path: apps/prism-installer/src-tauri/target/release/bundle/dmg/*.dmg

  # ─── Job 4: Publish GitHub Release ───────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: prism-installer-windows
          path: installers/

      - uses: actions/download-artifact@v4
        with:
          name: prism-installer-macos
          path: installers/

      - uses: softprops/action-gh-release@v2
        with:
          files: installers/*
          generate_release_notes: true
