# =============================================================================
# DEPRECATED — This NSIS installer workflow is superseded by the Tauri installer
# workflow at .github/workflows/prism-installer-release.yml
# Kept for rollback purposes. See: .prism/shared/plans/2026-03-05-unified-tauri-installer.md
# =============================================================================
name: Build Prism Setup Installer (DEPRECATED)

on:
  # Tag trigger removed — this workflow is deprecated
  # push:
  #   tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 2.4.2)'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build prism-cli for Windows
        run: |
          cd apps/prism-cli
          GOOS=windows GOARCH=amd64 go build \
            -ldflags "-X main.version=${VERSION}" \
            -o bin/prism-cli-windows-amd64.exe .
        env:
          VERSION: ${{ github.ref_name || github.event.inputs.version }}

      - name: Build VSIX extension
        run: |
          cd apps/prism-vscode
          npm ci
          mkdir -p ../prism-setup/resources/extensions
          npx @vscode/vsce package \
            --no-dependencies \
            --baseContentUrl https://github.com/TheDigitalGriot/prism-plugin/tree/main/apps/prism-vscode \
            --baseImagesUrl https://github.com/TheDigitalGriot/prism-plugin/raw/main/apps/prism-vscode \
            --out ../prism-setup/resources/extensions/prism.vsix
        continue-on-error: true

      - name: Copy plugin files
        run: |
          mkdir -p apps/prism-setup/resources/plugin
          cp -r commands apps/prism-setup/resources/plugin/
          cp -r agents apps/prism-setup/resources/plugin/

      - uses: actions/upload-artifact@v4
        with:
          name: nsis-resources
          path: |
            apps/prism-cli/bin/prism-cli-windows-amd64.exe
            apps/prism-setup/resources/

  build-nsis:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: nsis-resources
          path: .

      - name: Install NSIS and plugins
        run: |
          sudo apt-get update -q
          sudo apt-get install -y nsis nsis-pluginapi

          # EnVar plugin for PATH manipulation
          curl -fsSL \
            https://github.com/GsNSIS/EnVar/releases/latest/download/EnVar-Plugin.zip \
            -o /tmp/envar.zip
          unzip -o /tmp/envar.zip -d /tmp/envar
          sudo cp /tmp/envar/Plugins/x86-unicode/EnVar.dll \
            /usr/share/nsis/Plugins/x86-unicode/

          # NScurl plugin for HTTPS downloads
          curl -fsSL \
            https://github.com/negrutiu/nsis-nscurl/releases/latest/download/NScurl.zip \
            -o /tmp/nscurl.zip
          unzip -o /tmp/nscurl.zip -d /tmp/nscurl
          sudo cp /tmp/nscurl/Plugins/x86-unicode/NScurl.dll \
            /usr/share/nsis/Plugins/x86-unicode/

      - name: Compile NSIS installer
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [[ "$VERSION" == refs/* ]]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          VERSION="${VERSION#v}"
          cd installer
          makensis -V4 -DVERSION="${VERSION}" prism-setup.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: prism-setup-windows
          path: installer/Prism-Setup-*.exe

  release:
    needs: build-nsis
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: prism-setup-windows
          path: installers/

      - uses: softprops/action-gh-release@v2
        with:
          files: installers/*.exe
          generate_release_notes: true
