<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prism Brainstorm</title>
<style>
  /*
   * BRAINSTORM COMPANION FRAME TEMPLATE
   * griotwave design system — ported from 1051 session canonical screens
   *
   * Provides: ambient blooms, glass cards, JetBrains Mono eyebrows,
   * ember color system, depth shadows, fidelity-responsive overrides,
   * collapsible drawer, and all reusable component classes.
   *
   * Content is injected via placeholder comment in #claude-content.
   */

  /* ===== GRIOTWAVE TOKENS ===== */
  /* griotwave-tokens-start */
    /* griotwave port v0.3.0 @ 2026-06-03T13:21:21.871Z — generated by port-griotwave.cjs, do not hand-edit */
  :root{
    /* canvas */
    --void:#000000; --ash:#111111;
    --haze-04:rgba(255,255,255,.04); --haze-05:rgba(255,255,255,0.05);
    --haze-06:rgba(255,255,255,.06); --haze-10:rgba(255,255,255,0.10);
    --rim-08:rgba(255,255,255,0.08); --rim-10:rgba(255,255,255,.10);
    --rim-15:rgba(255,255,255,0.15);

    /* text — semantic scale */
    --voice:#FFFFFF;
    --echo:rgba(255,255,255,0.85);
    --whisper:rgba(255,255,255,0.60);
    --footstep:rgba(255,255,255,0.40);

    /* embers — neural blue (Synthetix: research, intelligence, deep work) */
    --neural:#3B82F6; --neural-glow:rgba(59,130,246,.22); --neural-wash:rgba(59,130,246,0.20);
    /* embers — bioluminescent (success, life, growth) */
    --bio:#10B985; --bio-hot:#00FF66;
    --bio-glow:rgba(16,185,133,.22); --bio-wash:rgba(16,185,129,0.20);
    /* embers — solar flare (warning, energy, attention) */
    --solar:#F97316; --solar-glow:rgba(249,115,22,.22); --solar-wash:rgba(249,115,22,0.20);
    /* embers — voltage (selection, confirmation, electric) */
    --voltage:#C6F91F; --voltage-glow:rgba(198,249,31,.22); --voltage-wash:rgba(198,249,31,0.20);
    /* embers — beacon (error, danger, stop) */
    --beacon:#FF0033;

    /* radii */
    --r-pill:999px; --r-3xl:24px;

    /* glass */
    --blur-frost:blur(40px) saturate(140%);

    /* depth — card and lift variants */
    --depth-card:0 1px 0 0 rgba(255,255,255,.06) inset, 0 20px 60px 0 rgba(0,0,0,.35);
    --depth-lift:0 1px 0 0 rgba(255,255,255,.06) inset, 0 8px 24px 0 rgba(0,0,0,.35);

    /* type */
    --font-voice:Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
    --font-code:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', monospace;

    /* easing */
    --tale:cubic-bezier(0.4, 0, 0.2, 1);
    --pulse-e:cubic-bezier(0.4, 0, 0.6, 1);

    /* legacy aliases (for backward compat with old content fragments) */
    --bg-primary:var(--void); --bg-secondary:var(--haze-05); --bg-tertiary:var(--haze-10);
    --border:var(--rim-08); --text-primary:var(--voice); --text-secondary:var(--whisper);
    --text-tertiary:var(--footstep); --accent:var(--neural); --accent-hover:#60A5FA;
    --accent-soft:var(--neural-wash); --accent-wash:rgba(59,130,246,0.05);
    --success:var(--bio-hot); --warning:var(--solar); --error:var(--beacon);
    --selected-bg:var(--neural-wash); --selected-border:var(--neural);
  }

  /* ===== FIDELITY OVERRIDES ===== */
  [data-fidelity="lo"]{
    --depth-card:none; --depth-lift:none; --blur-frost:none;
    --neural:rgba(255,255,255,.60); --bio:rgba(255,255,255,.50);
    --solar:rgba(255,255,255,.50); --voltage:rgba(255,255,255,.50);
  }
  [data-fidelity="lo"] .amb{display:none}
  [data-fidelity="lo"] body::before{opacity:.4}
  [data-fidelity="lo"] .opt,.card{border-style:dashed}

  [data-fidelity="mid"]{
    --blur-frost:blur(8px);
    --depth-card:0 1px 0 0 rgba(255,255,255,.04) inset, 0 8px 24px 0 rgba(0,0,0,.30);
    --depth-lift:0 1px 0 0 rgba(255,255,255,.03) inset, 0 4px 12px 0 rgba(0,0,0,.25);
  }
  [data-fidelity="mid"] .amb{opacity:.25}

  /* hi is the default :root values — full griotwave glass */
    /* griotwave-tokens-end */

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--rim-15);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:var(--whisper)}
  *{scrollbar-width:thin;scrollbar-color:var(--rim-15) transparent}

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background:var(--void);color:var(--echo);
    font-family:var(--font-voice);
    -webkit-font-smoothing:antialiased;line-height:1.6;
    display:flex;flex-direction:column;
  }

  /* ===== GRID OVERLAY ===== */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(to right,rgba(255,255,255,.025) 1px,transparent 1px),
      linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:32px 32px;
  }

  /* ===== AMBIENT BLOOMS ===== */
  .amb{position:fixed;pointer-events:none;z-index:0;border-radius:50%;filter:blur(140px);opacity:.45}
  .amb.a{top:-180px;right:-120px;width:520px;height:520px;background:radial-gradient(circle,rgba(59,130,246,.55) 0%,transparent 70%)}
  .amb.b{bottom:-260px;left:18%;width:560px;height:560px;background:radial-gradient(circle,rgba(198,249,31,.22) 0%,transparent 70%)}
  .amb.c{top:25%;left:-180px;width:460px;height:460px;background:radial-gradient(circle,rgba(16,185,133,.28) 0%,transparent 70%)}

  /* ===== HEADER ===== */
  .header{
    position:relative;z-index:2;flex-shrink:0;
    padding:14px 28px;
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(0,0,0,.55);
    border-bottom:1px solid var(--rim-08);
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
  }
  .header h1{
    font-size:11px;font-weight:500;
    text-transform:uppercase;letter-spacing:.18em;
    color:var(--whisper);
    font-family:var(--font-code);
  }
  .header .status{
    display:inline-flex;align-items:center;gap:10px;
    font-size:10px;text-transform:uppercase;letter-spacing:.16em;
    color:var(--whisper);padding:7px 14px;
    background:var(--haze-05);border:1px solid var(--rim-10);
    border-radius:var(--r-pill);
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    box-shadow:var(--depth-lift);
    font-family:var(--font-code);
  }
  .header .status .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--bio-hot);
    box-shadow:0 0 8px 0 var(--bio-hot);
    animation:pulseDot 2s var(--pulse-e) infinite;
  }
  @keyframes pulseDot{0%,100%{opacity:1}50%{opacity:.4}}

  /* ===== MAIN ===== */
  .body-container{flex:1;display:flex;flex-direction:row;min-height:0;position:relative}
  .main{flex:1;overflow-y:auto;position:relative;z-index:1}
  #claude-content{max-width:1140px;margin:0 auto;padding:48px 40px 80px;min-height:100%}

  /* ===== TYPOGRAPHY ===== */
  .eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--footstep);font-family:var(--font-code)}
  .eyebrow .pill{padding:3px 9px;border-radius:var(--r-pill);font-size:9px;letter-spacing:.14em;border:1px solid}
  h2, h2.title{font-size:40px;margin:8px 0 4px;letter-spacing:-.02em;font-weight:600;color:var(--voice)}
  h3{font-size:1.1rem;font-weight:600;margin-bottom:.25rem;color:var(--voice)}
  .lede{font-size:15px;color:var(--whisper);max-width:800px;margin:0 0 40px}
  .lede b{color:var(--voice)}
  .lede code, .opt code, .opt li code{font-family:var(--font-code);font-size:11px;background:rgba(0,0,0,.4);padding:1px 6px;border-radius:4px;color:var(--echo)}
  .sub-label{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--footstep);font-family:var(--font-code);margin:32px 0 14px}
  .sub-label b{color:var(--voice);font-weight:500}
  .section{margin-bottom:2rem}
  .subtitle{color:var(--whisper);margin-bottom:1.5rem}
  .label{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--footstep);font-family:var(--font-code);margin-bottom:0.5rem}

  /* ===== OPTIONS (for A/B/C choices) ===== */
  .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:10px}
  .option, .opt{
    background:var(--haze-04);border:1px solid var(--rim-08);border-radius:20px;
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    padding:20px 22px;
    box-shadow:var(--depth-card);
    cursor:pointer;
    transition:all 400ms var(--tale);
    position:relative;overflow:hidden;
  }
  .option:hover, .opt:hover{background:var(--haze-06);transform:translateY(-2px)}
  .option.selected, .opt.selected{
    background:var(--haze-10);border-color:var(--voltage);
    box-shadow:var(--depth-card),0 0 30px 0 rgba(198,249,31,.25);
  }
  .option .letter, .opt .letter{
    background:var(--neural-wash);color:var(--neural);
    width:1.75rem;height:1.75rem;border-radius:6px;
    display:inline-flex;align-items:center;justify-content:center;
    font-weight:600;font-size:.85rem;flex-shrink:0;
    border:1px solid rgba(59,130,246,.25);
    font-family:var(--font-code);
  }
  .option.selected .letter, .opt.selected .letter{background:var(--neural);color:white;border-color:var(--neural)}

  /* Option with letter + content side-by-side */
  .option{display:flex;align-items:flex-start;gap:1rem}
  .option .content{flex:1}
  .option .content h3{font-size:.95rem;margin-bottom:.15rem}
  .option .content p{color:var(--whisper);font-size:.85rem;margin:0}

  /* Option tags */
  .opt .tag, .tag{
    font-family:var(--font-code);font-size:9px;
    text-transform:uppercase;letter-spacing:.12em;color:var(--footstep);
  }
  .opt h4{font-size:16px;margin:8px 0 12px;color:var(--voice);font-weight:600;letter-spacing:-.01em}
  .opt p{font-size:12.5px;line-height:1.6;margin:0 0 12px;color:var(--whisper)}

  /* Pick / recommended option */
  .opt.pick, .option.pick{
    background:var(--haze-10);border-color:rgba(59,130,246,.4);
    box-shadow:var(--depth-card),0 0 30px 0 rgba(59,130,246,.18);
  }
  .opt.pick .tag{color:var(--neural)}
  .opt.pick::before{
    content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;
    background:radial-gradient(ellipse 60% 40% at 0% 0%,var(--neural),transparent 70%);opacity:.10;
  }
  .opt.pick.selected, .option.pick.selected{
    border-color:var(--voltage);
    box-shadow:var(--depth-card),0 0 30px 0 rgba(198,249,31,.25),0 0 60px 0 rgba(198,249,31,.10);
  }
  .opt.pick.selected::before{
    background:radial-gradient(ellipse 60% 40% at 0% 0%,var(--voltage),transparent 70%);opacity:.15;
  }
  .pickhint{font-size:10px;font-family:var(--font-code);color:var(--neural);margin-top:14px;text-transform:uppercase;letter-spacing:.12em;position:relative}

  /* Pro/con lists */
  .opt ul{margin:0;padding-left:16px;font-size:11.5px;color:var(--whisper);line-height:1.6}
  .opt ul.pro li::marker{color:var(--bio)}
  .opt ul.con li::marker{color:var(--beacon)}
  .prolabel{font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;color:var(--bio);margin-top:12px;display:block;margin-bottom:4px}
  .conlabel{font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;color:var(--beacon);margin-top:10px;display:block;margin-bottom:4px}

  /* Ember-tinted option variants */
  .opt.b{border-color:rgba(59,130,246,.4)}
  .opt.b .tag{color:var(--neural)}
  .opt.b::before{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 0% 0%,var(--neural),transparent 70%);opacity:.08}
  .opt.c{border-color:rgba(249,115,22,.25)}
  .opt.c .tag{color:var(--solar)}
  .opt.c::before{content:"";position:absolute;inset:0;border-radius:20px;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 0% 0%,var(--solar),transparent 70%);opacity:.08}

  /* ===== TOOL-CARDS (grid items) ===== */
  .tool-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .tool-card{
    padding:24px;border-radius:var(--r-3xl);
    background:var(--haze-04);border:1px solid var(--rim-08);
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    box-shadow:var(--depth-card);
    position:relative;overflow:hidden;
    transition:border-color 500ms var(--tale),box-shadow 500ms var(--tale),transform 500ms var(--tale),background 500ms var(--tale);
  }
  .tool-card::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse 60% 40% at 0% 0%,var(--ember-c,var(--neural)),transparent 70%);
    opacity:.10;pointer-events:none;transition:opacity 500ms var(--tale);
  }
  .tool-card:hover{
    background:var(--haze-06);transform:translateY(-3px);
    border-color:var(--ember-c,var(--neural));
    box-shadow:0 1px 0 0 rgba(255,255,255,.10) inset,0 0 24px 0 var(--ember-glow,var(--neural-glow)),0 0 60px 0 var(--ember-wash,var(--neural-wash)),0 25px 50px -12px rgba(0,0,0,.50);
  }
  .tool-card:hover::before{opacity:.35}
  .tool-card h4{font-size:20px;color:var(--voice);font-weight:600;margin-bottom:8px;letter-spacing:-.01em}
  .tool-card > p{font-size:13px;color:var(--whisper);line-height:1.6;margin-bottom:14px;position:relative}
  .tool-card .touches{font-size:10px;font-family:var(--font-code);color:var(--footstep);text-transform:uppercase;letter-spacing:.08em;position:relative}
  .tool-card .touches b{color:var(--echo);font-weight:500}

  /* ===== CARDS (for showing designs/mockups) ===== */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px}
  .card{
    background:var(--haze-04);border:1px solid var(--rim-08);border-radius:var(--r-3xl);
    overflow:hidden;cursor:pointer;
    transition:all 400ms var(--tale);box-shadow:var(--depth-card);
  }
  .card:hover{border-color:var(--neural);transform:translateY(-2px);box-shadow:var(--depth-card),0 0 24px 0 var(--neural-glow)}
  .card.selected{border-color:var(--voltage);box-shadow:var(--depth-card),0 0 30px 0 rgba(198,249,31,.25)}
  .card-image{background:var(--haze-10);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
  .card-body{padding:1rem}
  .card-body h3{margin-bottom:.25rem}
  .card-body p{color:var(--whisper);font-size:.85rem}

  /* ===== META GRID (key/value cells) ===== */
  .meta{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:48px}
  .meta .cell{
    background:var(--haze-10);border:1px solid var(--rim-08);border-radius:20px;
    padding:18px 22px;backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    box-shadow:var(--depth-card);
  }
  .meta .k{font-family:var(--font-code);font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--footstep);margin-bottom:6px}
  .meta .v{font-size:15px;color:var(--voice);letter-spacing:-.005em}

  /* ===== MOCKUP CONTAINER ===== */
  .mockup{
    background:var(--haze-04);border:1px solid var(--rim-08);border-radius:18px;
    overflow:hidden;margin-bottom:1.5rem;
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    box-shadow:var(--depth-card);
  }
  .mockup-header{
    background:rgba(0,0,0,.3);padding:.5rem 1rem;font-size:10px;
    color:var(--footstep);border-bottom:1px solid var(--rim-08);
    font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;
  }
  .mockup-body{padding:1.5rem}

  /* ===== ARC / DIAGRAM / SEQUENCE BOX ===== */
  .arc, .diagram, .seq-box{
    background:rgba(0,0,0,.4);border:1px solid var(--rim-08);border-radius:14px;
    padding:18px 22px;font-family:var(--font-code);font-size:12px;
    color:var(--whisper);line-height:1.85;
  }
  .arc b, .diagram b, .seq-box b{color:var(--voice);font-weight:500}
  .arc .c{color:var(--footstep)}

  /* ===== CALLOUT BOXES ===== */
  .mea{
    margin-bottom:40px;padding:18px 22px;
    background:rgba(34,211,170,.06);border:1px solid rgba(16,185,133,.28);border-radius:14px;
    font-size:13px;color:var(--echo);line-height:1.7;
  }
  .mea .label{font-family:var(--font-code);font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--bio-hot);margin-bottom:6px;display:block}
  .mea b{color:var(--voice);font-weight:600}

  .caveats{
    margin-top:36px;padding:18px 22px;
    background:rgba(249,115,22,.05);border:1px solid rgba(249,115,22,.22);border-radius:14px;
    font-size:12px;color:var(--whisper);line-height:1.8;
  }
  .caveats .label{font-family:var(--font-code);font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--solar);margin-bottom:6px;display:block}
  .caveats b{color:var(--voice)}
  .caveats ul{margin:6px 0 0 18px}
  .caveats li{margin-bottom:3px}

  /* ===== PROS/CONS ===== */
  .pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1rem 0}
  .pros,.cons{background:var(--haze-04);border-radius:12px;padding:1rem;border:1px solid var(--rim-08)}
  .pros h4{color:var(--bio-hot);font-size:.85rem;margin-bottom:.5rem;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;font-weight:500}
  .cons h4{color:var(--beacon);font-size:.85rem;margin-bottom:.5rem;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;font-weight:500}
  .pros ul,.cons ul{margin-left:1.25rem;font-size:.85rem;color:var(--whisper)}
  .pros li,.cons li{margin-bottom:.25rem}

  /* ===== SPLIT VIEW ===== */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  @media(max-width:700px){.split{grid-template-columns:1fr}}

  /* ===== PLACEHOLDER ===== */
  .placeholder{
    background:var(--haze-04);border:2px dashed var(--rim-15);border-radius:12px;
    padding:2rem;text-align:center;color:var(--footstep);
    font-family:var(--font-code);font-size:11px;text-transform:uppercase;letter-spacing:.12em;
  }

  /* ===== INLINE TAGS ===== */
  .tag.blue{background:var(--neural-wash);color:var(--neural);padding:3px 9px;border-radius:var(--r-pill);font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;border:1px solid rgba(59,130,246,.25)}
  .tag.green{background:var(--bio-wash);color:var(--bio-hot);padding:3px 9px;border-radius:var(--r-pill);font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;border:1px solid rgba(16,185,133,.25)}
  .tag.amber{background:var(--solar-wash);color:var(--solar);padding:3px 9px;border-radius:var(--r-pill);font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;border:1px solid rgba(249,115,22,.25)}
  .tag.volt{background:var(--voltage-wash);color:var(--voltage);padding:3px 9px;border-radius:var(--r-pill);font-size:9px;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.12em;border:1px solid rgba(198,249,31,.25)}

  /* ===== INLINE MOCKUP ELEMENTS ===== */
  .mock-nav{background:var(--neural);color:white;padding:.75rem 1rem;display:flex;gap:1.5rem;font-size:.9rem;border-radius:8px 8px 0 0}
  .mock-sidebar{background:var(--haze-10);padding:1rem;min-width:180px;border-right:1px solid var(--rim-08)}
  .mock-content{padding:1.5rem;flex:1}
  .mock-button{background:var(--neural);color:white;border:none;padding:.5rem 1rem;border-radius:6px;font-size:.85rem;cursor:pointer;font-family:var(--font-code);text-transform:uppercase;letter-spacing:.08em;font-size:10px}
  .mock-input{background:rgba(0,0,0,.4);border:1px solid var(--rim-10);border-radius:6px;padding:.5rem;width:100%;color:var(--echo);font-family:var(--font-code)}

  /* ===== DRAWER ===== */
  .drawer{
    width:280px;flex-shrink:0;
    background:rgba(0,0,0,.55);
    border-left:1px solid var(--rim-08);
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
    display:flex;flex-direction:column;overflow:hidden;
    transition:width .25s var(--tale),opacity .2s ease;
    z-index:2;
  }
  .drawer.collapsed{width:0;opacity:0;border-left:none;pointer-events:none}
  .drawer-toggle{
    position:absolute;right:280px;top:50%;transform:translateY(-50%);z-index:10;
    background:var(--haze-10);border:1px solid var(--rim-10);border-right:none;
    border-radius:6px 0 0 6px;color:var(--whisper);
    padding:10px 5px;cursor:pointer;font-size:12px;line-height:1;
    transition:color .15s ease,background .15s ease,right .25s var(--tale);
    font-family:var(--font-code);
    writing-mode:vertical-lr;
    letter-spacing:.08em;
  }
  .drawer-toggle:hover{color:var(--neural);background:var(--neural-wash)}
  .drawer-toggle svg{display:block}
  .drawer-toggle.collapsed-state{
    right:0;writing-mode:horizontal-tb;
    padding:10px 6px;border-radius:6px 0 0 6px;
  }
  .drawer .pane{padding:14px 16px;overflow-y:auto;flex:1 1 auto;min-height:0}
  .drawer .pane.decisions-pane{border-bottom:1px solid var(--rim-08)}
  .drawer .pane.has-collapsed-content{flex:0 0 auto}
  .drawer .pane-header{
    display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;user-select:none;margin-bottom:10px;
    padding-bottom:6px;border-bottom:1px dashed var(--rim-10);
  }
  .drawer .pane-header:hover h2{color:var(--bio-hot)}
  .drawer .pane-header .chevron{font-size:8px;color:var(--footstep);transition:transform .2s ease}
  .drawer .pane-header.collapsed-section .chevron{transform:rotate(-90deg)}
  .drawer .pane-body{transition:max-height .25s var(--tale),opacity .2s ease;overflow:hidden}
  .drawer .pane-body.collapsed-content{max-height:0 !important;opacity:0}
  .drawer h2{
    font-size:8.5px;font-weight:600;color:var(--footstep);
    text-transform:uppercase;letter-spacing:.14em;margin-bottom:0;
    font-family:var(--font-code);
  }
  .drawer .pane-header .ico{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .drawer .pane.decisions-pane .ico{background:var(--bio-hot);box-shadow:0 0 6px 0 var(--bio-hot)}
  .drawer .pane.parking-pane .ico{background:var(--solar);box-shadow:0 0 6px 0 var(--solar)}
  .drawer ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px}
  .drawer .empty{font-size:10px;color:var(--footstep);font-style:italic;font-family:var(--font-code)}
  .drawer .decision-item,.drawer .parked-item{
    background:rgba(0,0,0,.5);border:1px solid var(--rim-10);border-radius:8px;
    padding:8px 10px;font-size:11px;color:var(--whisper);line-height:1.45;
    font-family:var(--font-code);cursor:pointer;
  }
  .drawer .decision-item .q,.drawer .parked-item .q{
    display:inline-block;font-size:9px;font-weight:700;color:var(--bio-hot);
    text-transform:uppercase;letter-spacing:.08em;margin-right:6px;
  }
  .drawer .parked-item .q{color:var(--solar)}
  .drawer .decision-item .label,.drawer .parked-item .label{color:var(--voice);font-weight:500}
  .drawer .decision-item .summary,.drawer .parked-item .concern{display:block;margin-top:4px;color:var(--whisper);overflow:hidden;max-height:0;opacity:0;transition:max-height .25s var(--tale),opacity .2s ease,margin-top .2s ease}
  .drawer .parked-item .revisit{display:block;margin-top:0;font-size:10px;color:var(--footstep);font-style:italic;overflow:hidden;max-height:0;opacity:0;transition:max-height .25s var(--tale),opacity .2s ease,margin-top .2s ease}
  .drawer .decision-item.expanded .summary,.drawer .parked-item.expanded .concern{max-height:200px;opacity:1;margin-top:4px}
  .drawer .parked-item.expanded .revisit{max-height:40px;opacity:1;margin-top:4px}
  .drawer .warning{
    margin-top:8px;padding:6px 8px;border-radius:6px;
    background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.22);
    color:var(--solar);font-size:10px;font-family:var(--font-code);
  }

  /* ===== INDICATOR BAR ===== */
  .indicator-bar{
    position:relative;z-index:2;flex-shrink:0;
    background:rgba(0,0,0,.55);
    border-top:1px solid var(--rim-08);
    padding:12px 28px;text-align:center;
    backdrop-filter:var(--blur-frost);-webkit-backdrop-filter:var(--blur-frost);
  }
  .indicator-bar span{
    font-size:10px;font-family:var(--font-code);
    text-transform:uppercase;letter-spacing:.14em;color:var(--footstep);
  }
  .indicator-bar .selected-text{color:var(--voltage)}
</style>
</head>
