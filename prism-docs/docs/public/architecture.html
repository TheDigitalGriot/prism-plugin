<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism — Architecture Explorer</title>
<style>
  :root{
    --bg:#f6f4ef; --band:#ece8df; --band-line:#ddd6c9;
    --card:#fffefb; --card-border:#d9d3c7; --card-hover:#bcae8f;
    --ink:#2b2823; --sub:#8a8377; --mut:#a59d8e;
    --err:#b4321f; --err-bg:#fdf3f1; --err-border:#e7bcb2;
    --edge:#bdb6a8; --edge-err:#d07a68; --edge-meta:#c7c0b2;
    --panel:#fffefb; --panel-border:#e4ded2;
    --accent1:#3b82f6; --accent2:#14b8a6; --accent3:#f59e0b;
    --shadow:0 1px 2px rgba(40,36,28,.06),0 4px 14px rgba(40,36,28,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;color:var(--ink);overflow:hidden}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}

  header{position:fixed;top:0;left:0;right:0;height:48px;z-index:30;display:flex;align-items:center;
    gap:14px;padding:0 16px;background:rgba(255,254,251,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--panel-border)}
  .logo{display:flex;align-items:center;gap:9px;font-weight:650;font-size:14px}
  .logo .x{color:var(--mut);font-weight:400}
  .tabs{display:flex;gap:4px;margin-left:6px}
  .tab{font:inherit;font-size:12.5px;color:var(--sub);background:transparent;border:1px solid transparent;border-radius:8px;padding:5px 12px;cursor:pointer;transition:.12s}
  .tab:hover{color:var(--ink);background:#f0ece3}
  .tab.on{color:var(--ink);background:var(--card);border-color:var(--card-border);font-weight:600;box-shadow:var(--shadow)}
  .spacer{flex:1}
  .ctrls{display:flex;align-items:center;gap:6px}
  button.btn{font:inherit;font-size:12px;color:var(--ink);background:var(--card);border:1px solid var(--card-border);border-radius:7px;padding:5px 10px;cursor:pointer;transition:.12s}
  button.btn:hover{border-color:var(--card-hover);background:#fff}
  .zoom{font-size:11px;color:var(--sub);min-width:46px;text-align:center}

  #viewport{position:fixed;inset:48px 0 0 0;overflow:hidden;cursor:grab}
  #viewport.grabbing{cursor:grabbing}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

  .band{position:absolute;border-radius:14px;background:var(--band);border:1px solid var(--band-line)}
  .band .blab{position:absolute;top:9px;left:16px;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:600}
  .band .bname{position:absolute;top:21px;left:16px;font-size:13px;font-weight:650;color:#5c564a}

  .node{position:absolute;width:158px;min-height:50px;background:var(--card);border:1px solid var(--card-border);border-radius:8px;
    padding:9px 11px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;user-select:none}
  .node:hover{border-color:var(--card-hover);transform:translateY(-1px);box-shadow:0 2px 4px rgba(40,36,28,.08),0 8px 22px rgba(40,36,28,.07)}
  .node .nl{font-size:12px;font-weight:600;line-height:1.25}
  .node .ns{font-size:9.5px;color:var(--sub);margin-top:3px;line-height:1.3}
  .node .ntag{position:absolute;top:7px;right:9px;font-size:8px;color:var(--mut);letter-spacing:.05em}
  .node.err{background:var(--err-bg);border-color:var(--err-border)} .node.err .nl{color:var(--err)}
  .node.sel{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(20,184,166,.25),var(--shadow)}
  .node.child{width:142px;min-height:42px;padding:7px 9px;background:#fcfaf4}
  .node.child .nl{font-size:11px} .node.child .ns{font-size:9px}
  .exp{position:absolute;bottom:6px;right:8px;font-size:9px;font-weight:700;color:#0f766e;background:#e9f6f3;border:1px solid #cfeae3;border-radius:10px;padding:1px 7px;cursor:pointer}
  .exp:hover{background:#dcf0eb}
  .exp.open{color:#92740f;background:#fbf6ea;border-color:#ecdfbf}

  .legend{position:fixed;left:16px;bottom:16px;z-index:20;background:rgba(255,254,251,.92);backdrop-filter:blur(6px);border:1px solid var(--panel-border);border-radius:10px;padding:11px 13px;font-size:10.5px;color:var(--sub)}
  .legend .lt{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:7px;font-weight:600}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .legend .ln{width:26px;height:0;border-top:2px solid var(--edge)}
  .legend .ln.err{border-top:2px solid var(--edge-err)} .legend .ln.meta{border-top:2px dashed var(--edge-meta)}

  #panel{position:fixed;top:48px;right:0;bottom:0;width:380px;max-width:92vw;z-index:25;background:var(--panel);border-left:1px solid var(--panel-border);
    box-shadow:-8px 0 30px rgba(40,36,28,.08);transform:translateX(102%);transition:transform .26s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
  #panel.open{transform:translateX(0)}
  #panel .ph{position:sticky;top:0;background:var(--panel);padding:18px 20px 14px;border-bottom:1px solid var(--panel-border)}
  #panel .kicker{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600}
  #panel h2{margin:6px 0 0;font-size:18px;font-weight:680;line-height:1.2}
  #panel .pclose{position:absolute;top:14px;right:14px;border:none;background:transparent;color:var(--mut);font-size:20px;cursor:pointer;line-height:1;padding:4px}
  #panel .pclose:hover{color:var(--ink)}
  #panel .pb{padding:16px 20px 30px}
  #panel .desc{font-size:13.5px;line-height:1.55;color:#403b32}
  #panel .sec{margin-top:18px} #panel .sec h3{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:0 0 8px;font-weight:600}
  #panel .file{font-size:11.5px;color:#5c564a;background:#f3efe7;border:1px solid #e7e1d5;border-radius:6px;padding:5px 8px;margin:5px 0;word-break:break-all}
  #panel .li{font-size:12.5px;color:#403b32;margin:6px 0;padding-left:14px;position:relative;line-height:1.4}
  #panel .li:before{content:'▸';position:absolute;left:0;color:var(--mut)}
  #panel a.doc{display:inline-flex;gap:6px;font-size:12.5px;color:#0f766e;text-decoration:none;margin:4px 10px 4px 0}
  #panel a.doc:hover{text-decoration:underline}
  #panel .chip{display:inline-block;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin-right:6px}
  .chip.main{background:#eef4ff;color:#3257b0} .chip.svc{background:#f0fdf4;color:#15803d}
  .chip.meta{background:#fbf6ea;color:#92740f} .chip.err{background:var(--err-bg);color:var(--err)} .chip.flow{background:#f3eefe;color:#6b46c1}
  .hint{position:fixed;right:16px;bottom:16px;z-index:20;font-size:10.5px;color:var(--mut)}
</style>
</head>

</header>

<div id="viewport"><div id="canvas"><svg id="edges"></svg></div></div>

</div>

/* ───────────────────────── ENGINE ───────────────────────── */
const canvas=document.getElementById('canvas'), svg=document.getElementById('edges'), vp=document.getElementById('viewport');
let view='runtime', expanded=new Set(), tx=40,ty=20,scale=1;
const TAB=[['runtime','Runtime'],['workflows','Workflows'],['plugin','Plugin']];
const tabsEl=document.getElementById('tabs');
TAB.forEach(([k,lab])=>{ const b=document.createElement('button'); b.className='tab'+(k===view?' on':''); b.textContent=lab; b.onclick=()=>switchView(k); b.dataset.k=k; tabsEl.appendChild(b); });

function topNodes(){ return VIEWS[view].nodes; }
function childNodes(){ const out=[]; for(const n of topNodes()){ if(n.children&&expanded.has(n.id)) for(const c of n.children) out.push(Object.assign({},c,{x:n.x+c.dx,y:n.y+c.dy,kind:'child',parent:n.id})); } return out; }
function allNodes(){ return [...topNodes(),...childNodes()]; }
function byId(id){ return allNodes().find(n=>n.id===id); }

function render(){
  canvas.querySelectorAll('.band,.node').forEach(e=>e.remove());
  const V=VIEWS[view];
  document.getElementById('leg1').textContent=V.legend[0];
  document.getElementById('leg2').textContent=V.legend[1];
  document.getElementById('leg3').textContent=V.legend[2];
  for(const b of V.bands){ const d=document.createElement('div'); d.className='band'; d.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px`; d.innerHTML=`<div class="blab">${b.lab}</div><div class="bname">${b.name}</div>`; canvas.appendChild(d); }
  for(const n of allNodes()){
    const el=document.createElement('div');
    el.className='node'+(n.kind==='err'?' err':'')+(n.kind==='child'?' child':'');
    el.style.cssText=`left:${n.x}px;top:${n.y}px;width:${n.kind==='child'?142:N}px`; el.dataset.id=n.id;
    const tag=n.kind==='child'?'':`<div class="ntag mono">${n.kind}</div>`;
    el.innerHTML=`${tag}<div class="nl">${n.label}</div><div class="ns">${n.sub||''}</div>`;
    el.addEventListener('click',e=>{ e.stopPropagation(); select(n.id); });
    if(n.children&&n.children.length){ const x=document.createElement('div'); x.className='exp'+(expanded.has(n.id)?' open':''); x.textContent=expanded.has(n.id)?'– hide':'＋ '+n.children.length;
      x.onclick=ev=>{ ev.stopPropagation(); expanded.has(n.id)?expanded.delete(n.id):expanded.add(n.id); render(); }; el.appendChild(x); }
    canvas.appendChild(el);
  }
  drawEdges();
}
function geom(id){ const n=byId(id); const w=n&&n.kind==='child'?142:N; const el=[...canvas.children].find(c=>c.dataset&&c.dataset.id===id); const h=el?el.offsetHeight:52; return {x:n.x,y:n.y,w,h,cx:n.x+w/2,top:n.y,bot:n.y+h}; }
function drawEdges(){
  svg.innerHTML=''; let mx=0,my=0; for(const n of allNodes()){mx=Math.max(mx,n.x+N);my=Math.max(my,n.y+60);} for(const b of VIEWS[view].bands){mx=Math.max(mx,b.x+b.w);my=Math.max(my,b.y+b.h);}
  svg.setAttribute('width',mx+80); svg.setAttribute('height',my+80);
  const E=[...VIEWS[view].edges];
  for(const n of topNodes()){ if(n.children&&expanded.has(n.id)) for(const c of n.children) E.push([n.id,c.id,'meta']); }
  for(const [f,t,k] of E){ const a=geom(f),z=geom(t); if(!a||!z)continue; let d;
    if(z.top>a.bot+4){ const m=(a.bot+z.top)/2; d=`M ${a.cx} ${a.bot} L ${a.cx} ${m} L ${z.cx} ${m} L ${z.cx} ${z.top}`; }
    else if(Math.abs(z.y-a.y)<60){ const sx=a.x+a.w, ex=z.x; if(ex>=sx){d=`M ${sx} ${a.y+a.h/2} L ${ex} ${z.y+z.h/2}`;} else {d=`M ${a.x} ${a.y+a.h/2} L ${z.x+z.w} ${z.y+z.h/2}`;} }
    else { const sx=a.x+a.w, sy=a.y+a.h/2, ex=z.cx, ey=z.top, midX=(sx+ex)/2; d=`M ${sx} ${sy} L ${midX} ${sy} L ${midX} ${ey-18} L ${ex} ${ey-18} L ${ex} ${ey}`; }
    const p=document.createElementNS(NS,'path'); p.setAttribute('d',d); p.setAttribute('fill','none');
    p.setAttribute('stroke',k==='err'?'var(--edge-err)':k==='meta'?'var(--edge-meta)':'var(--edge)'); p.setAttribute('stroke-width',k==='main'?'1.7':'1.4');
    if(k!=='main') p.setAttribute('stroke-dasharray',k==='err'?'5 4':'4 5'); svg.appendChild(p);
    const dot=document.createElementNS(NS,'circle'); dot.setAttribute('cx',z.cx); dot.setAttribute('cy',z.top); dot.setAttribute('r','2.4'); dot.setAttribute('fill',k==='err'?'var(--edge-err)':k==='meta'?'var(--edge-meta)':'var(--edge)'); svg.appendChild(dot);
  }
}

/* pan / zoom */
function apply(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; document.getElementById('zlbl').textContent=Math.round(scale*100)+'%'; }
let drag=false,sx=0,sy=0;
vp.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return; drag=true; vp.classList.add('grabbing'); sx=e.clientX-tx; sy=e.clientY-ty; });
window.addEventListener('mousemove',e=>{ if(!drag)return; tx=e.clientX-sx; ty=e.clientY-sy; apply(); });
window.addEventListener('mouseup',()=>{ drag=false; vp.classList.remove('grabbing'); });
vp.addEventListener('wheel',e=>{ e.preventDefault(); const r=vp.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top; const ns=Math.min(2.4,Math.max(.2,scale*(e.deltaY<0?1.1:.9))); tx=mx-(mx-tx)*(ns/scale); ty=my-(my-ty)*(ns/scale); scale=ns; apply(); },{passive:false});
function bounds(){ let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9; for(const b of VIEWS[view].bands){x0=Math.min(x0,b.x);y0=Math.min(y0,b.y);x1=Math.max(x1,b.x+b.w);y1=Math.max(y1,b.y+b.h);} for(const n of childNodes()){x1=Math.max(x1,n.x+N);y1=Math.max(y1,n.y+60);} return {x0,y0,x1,y1}; }
function fit(){ const r=vp.getBoundingClientRect(),b=bounds(),pad=46; scale=Math.min(1.35,Math.min((r.width-pad*2)/(b.x1-b.x0),(r.height-pad*2)/(b.y1-b.y0))); tx=pad-b.x0*scale+(r.width-pad*2-(b.x1-b.x0)*scale)/2; ty=pad-b.y0*scale; apply(); }
document.getElementById('fit').onclick=fit;
document.getElementById('zin').onclick=()=>{scale=Math.min(2.4,scale*1.15);apply();};
document.getElementById('zout').onclick=()=>{scale=Math.max(.2,scale*.87);apply();};
document.getElementById('reset').onclick=()=>{tx=40;ty=20;scale=1;apply();close();};
document.getElementById('expall').onclick=()=>{ const all=topNodes().filter(n=>n.children); const open=all.every(n=>expanded.has(n.id)); all.forEach(n=>open?expanded.delete(n.id):expanded.add(n.id)); render(); setTimeout(fit,30); };

/* panel */
const panel=document.getElementById('panel');
function select(id){ const n=byId(id),d=n.detail||{};
  canvas.querySelectorAll('.node').forEach(el=>el.classList.toggle('sel',el.dataset.id===id));
  document.getElementById('pk').textContent=({main:'Component',svc:'Service',adapter:'Adapter',surface:'Surface',meta:'Infrastructure',err:'Error / edge-case',flow:'Workflow step',child:'Sub-component'}[n.kind]||'Node');
  document.getElementById('pt').textContent=n.label;
  const c=n.kind==='svc'?'svc':n.kind==='meta'?'meta':n.kind==='err'?'err':n.kind==='flow'?'flow':'main';
  let h=`<div style="margin-bottom:14px"><span class="chip ${c}">${n.kind}</span><span class="mono" style="font-size:11px;color:var(--mut)">${n.sub||''}</span></div>`;
  if(d.desc) h+=`<div class="desc">${d.desc}</div>`;
  if(d.files&&d.files.length){ h+=`<div class="sec"><h3>Where it lives</h3>`+d.files.map(f=>`<div class="file mono">${f}</div>`).join('')+`</div>`; }
  if(d.docs&&d.docs.length){ h+=`<div class="sec"><h3>Read more</h3>`+d.docs.map(x=>`<a class="doc" href="${x.u}" ${x.u.startsWith('http')?'target="_blank"':''}>→ ${x.t}</a>`).join('')+`</div>`; }
  document.getElementById('pbody').innerHTML=h; panel.classList.add('open');
}
function close(){ panel.classList.remove('open'); canvas.querySelectorAll('.node').forEach(el=>el.classList.remove('sel')); }
document.getElementById('pclose').onclick=close;
vp.addEventListener('click',e=>{ if(!e.target.closest('.node')) close(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape')close(); if(e.key==='f')fit(); });

function switchView(k){ view=k; expanded=new Set(); close(); tabsEl.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.k===k)); render(); setTimeout(fit,30); }
render(); setTimeout(fit,60);
</script>
