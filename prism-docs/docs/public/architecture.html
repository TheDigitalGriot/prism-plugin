<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism — Architecture Explorer</title>
<style>
  :root{
    --bg:#f6f4ef; --band:#ece8df; --band-line:#ddd6c9;
    --card:#fffefb; --card-border:#d9d3c7; --card-hover:#bcae8f;
    --ink:#2b2823; --sub:#8a8377; --mut:#a59d8e;
    --err:#b4321f; --err-bg:#fdf3f1; --err-border:#e7bcb2;
    --edge:#bdb6a8; --edge-err:#d07a68; --edge-meta:#c7c0b2;
    --panel:#fffefb; --panel-border:#e4ded2;
    --accent1:#3b82f6; --accent2:#14b8a6; --accent3:#f59e0b;
    --shadow:0 1px 2px rgba(40,36,28,.06),0 4px 14px rgba(40,36,28,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;color:var(--ink);overflow:hidden}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}

  /* Header */
  header{position:fixed;top:0;left:0;right:0;height:48px;z-index:30;display:flex;align-items:center;
    gap:14px;padding:0 16px;background:rgba(255,254,251,.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--panel-border)}
  .logo{display:flex;align-items:center;gap:9px;font-weight:650;font-size:14px;letter-spacing:.2px}
  .logo svg{flex:0 0 auto}
  .logo .x{color:var(--mut);font-weight:400}
  .spacer{flex:1}
  .ctrls{display:flex;align-items:center;gap:6px}
  button.btn{font:inherit;font-size:12px;color:var(--ink);background:var(--card);border:1px solid var(--card-border);
    border-radius:7px;padding:5px 10px;cursor:pointer;transition:.12s}
  button.btn:hover{border-color:var(--card-hover);background:#fff}
  .zoom{font-size:11px;color:var(--sub);min-width:46px;text-align:center}

  /* Canvas */
  #viewport{position:fixed;inset:48px 0 0 0;overflow:hidden;cursor:grab}
  #viewport.grabbing{cursor:grabbing}
  #canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

  .band{position:absolute;border-radius:14px;background:var(--band);border:1px solid var(--band-line)}
  .band .blab{position:absolute;top:10px;left:16px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:600}
  .band .bname{position:absolute;top:22px;left:16px;font-size:13px;font-weight:650;color:#5c564a}

  .node{position:absolute;width:158px;min-height:52px;background:var(--card);border:1px solid var(--card-border);
    border-radius:8px;padding:9px 11px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s;user-select:none}
  .node:hover{border-color:var(--card-hover);transform:translateY(-1px);box-shadow:0 2px 4px rgba(40,36,28,.08),0 8px 22px rgba(40,36,28,.07)}
  .node .nl{font-size:12px;font-weight:600;line-height:1.25;color:var(--ink)}
  .node .ns{font-size:9.5px;color:var(--sub);margin-top:3px;line-height:1.3}
  .node .ntag{position:absolute;top:7px;right:9px;font-size:8px;color:var(--mut);letter-spacing:.05em}
  .node.err{background:var(--err-bg);border-color:var(--err-border)}
  .node.err .nl{color:var(--err)}
  .node.sel{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(20,184,166,.25),var(--shadow)}

  /* Legend */
  .legend{position:fixed;left:16px;bottom:16px;z-index:20;background:rgba(255,254,251,.92);backdrop-filter:blur(6px);
    border:1px solid var(--panel-border);border-radius:10px;padding:11px 13px;font-size:10.5px;color:var(--sub)}
  .legend .lt{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:7px;font-weight:600}
  .legend .row{display:flex;align-items:center;gap:8px;margin:5px 0}
  .legend .ln{width:26px;height:0;border-top:2px solid var(--edge)}
  .legend .ln.err{border-top:2px solid var(--edge-err)}
  .legend .ln.meta{border-top:2px dashed var(--edge-meta)}

  /* Detail panel */
  #panel{position:fixed;top:48px;right:0;bottom:0;width:380px;max-width:92vw;z-index:25;background:var(--panel);
    border-left:1px solid var(--panel-border);box-shadow:-8px 0 30px rgba(40,36,28,.08);
    transform:translateX(102%);transition:transform .26s cubic-bezier(.2,.8,.2,1);overflow-y:auto}
  #panel.open{transform:translateX(0)}
  #panel .ph{position:sticky;top:0;background:var(--panel);padding:18px 20px 14px;border-bottom:1px solid var(--panel-border)}
  #panel .kicker{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);font-weight:600}
  #panel h2{margin:6px 0 0;font-size:18px;font-weight:680;line-height:1.2}
  #panel .pclose{position:absolute;top:14px;right:14px;border:none;background:transparent;color:var(--mut);font-size:20px;cursor:pointer;line-height:1;padding:4px}
  #panel .pclose:hover{color:var(--ink)}
  #panel .pb{padding:16px 20px 28px}
  #panel .desc{font-size:13.5px;line-height:1.55;color:#403b32}
  #panel .sec{margin-top:20px}
  #panel .sec h3{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin:0 0 8px;font-weight:600}
  #panel .file{font-size:11.5px;color:#5c564a;background:#f3efe7;border:1px solid #e7e1d5;border-radius:6px;padding:5px 8px;margin:5px 0;word-break:break-all}
  #panel a.doc{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:#0f766e;text-decoration:none;margin:4px 10px 4px 0}
  #panel a.doc:hover{text-decoration:underline}
  #panel .chip{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:20px;margin-right:6px}
  .chip.main{background:#eef4ff;color:#3257b0}
  .chip.svc{background:#f0fdf4;color:#15803d}
  .chip.meta{background:#fbf6ea;color:#92740f}
  .chip.err{background:var(--err-bg);color:var(--err)}

  .hint{position:fixed;right:16px;bottom:16px;z-index:20;font-size:10.5px;color:var(--mut)}
</style>
</head>
<body>
<header>
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset=".5" stop-color="#14b8a6"/><stop offset="1" stop-color="#f59e0b"/></linearGradient></defs>
      <polygon points="12,2 22,20 2,20" fill="url(#g)"/></svg>
    Prism <span class="x">/ Architecture</span>
  </div>
  <div class="spacer"></div>
  <div class="ctrls">
    <button class="btn" id="fit">Fit all</button>
    <button class="btn" id="zout">–</button>
    <span class="zoom mono" id="zlbl">100%</span>
    <button class="btn" id="zin">+</button>
    <button class="btn" id="reset">Reset</button>
  </div>
</header>

<div id="viewport">
  <div id="canvas">
    <svg id="edges"></svg>
  </div>
</div>

<div class="legend">
  <div class="lt">Legend</div>
  <div class="row"><span class="ln"></span> Main data flow</div>
  <div class="row"><span class="ln err"></span> Error / edge-case</div>
  <div class="row"><span class="ln meta"></span> Supervision / relay</div>
</div>

<aside id="panel">
  <div class="ph">
    <button class="pclose" id="pclose">×</button>
    <div class="kicker" id="pk">—</div>
    <h2 id="pt">—</h2>
  </div>
  <div class="pb" id="pbody"></div>
</aside>

<div class="hint">drag to pan · scroll to zoom · click a node</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Prism architecture model. Each node: id, label, sub, kind, x, y, detail.
// kind: main | svc | adapter | surface | meta | err  (drives styling + chip)
// detail: { kind, desc, files:[], docs:[{t,u}] }
// ─────────────────────────────────────────────────────────────────────────────
const N = 158, NH = 56, GAPX = 28;
function row(y, items){ // helper: lay a row of nodes centered around x positions given per item
  return items.map(it => Object.assign({y}, it));
}

const NODES = [
  // ── Bands (visual groups) ──
  // Surfaces
  {id:'cli', x:60,  y:96,  kind:'surface', label:'CLI', sub:'Go · Bubble Tea TUI',
    detail:{kind:'main', desc:'A full-screen Go/Bubble Tea TUI. Its own plugin-based navigation, theme engine, and provider adapters (claude/codex/cursor). Talks to the broker via a hand-written Go WebSocket client.', files:['apps/prism-cli/','apps/prism-cli/daemon/client.go'], docs:[{t:'CLI docs',u:'cli/'},{t:'Surface clients',u:'daemon/clients'}]}},
  {id:'vscode', x:300, y:96, kind:'surface', label:'VS Code', sub:'TS extension + 3 React webviews',
    detail:{kind:'main', desc:'Cline-derived extension: in-process agent task loop, tree views, and three React webviews. Speaks the in-process gRPC seam over postMessage.', files:['apps/prism-vscode/src/','apps/prism-vscode/src/core/task/'], docs:[{t:'VS Code docs',u:'vscode/'}]}},
  {id:'electron', x:540, y:96, kind:'surface', label:'Electron', sub:'Desktop · reuses VS Code src',
    detail:{kind:'main', desc:'Forge+Vite desktop shell reusing @prism-core (logic) + @prism-ui (components) via the gRPC-over-IPC seam. Hosts + supervises the broker (daemon-manager).', files:['apps/prism-electron/src/','apps/prism-electron/src/hosts/electron/ElectronIPCBridge.ts'], docs:[{t:'Electron docs',u:'electron/'},{t:'Desktop daemon-manager',u:'daemon/desktop-manager'}]}},
  {id:'mobile', x:780, y:96, kind:'surface', label:'Mobile', sub:'Vendored paseo (Expo)',
    detail:{kind:'main', desc:'The one surface Prism does not author — paseo’s Expo app, rebranded. Versions in lockstep via the root VERSION file. Reaches the broker over the relay.', files:['apps/prism-mobile/packages/app/'], docs:[{t:'Version management',u:'monorepo/version-management'}]}},

  // Seam
  {id:'grpc', x:200, y:262, kind:'main', label:'gRPC seam', sub:'handleGrpcRequest · in-process',
    detail:{kind:'main', desc:'The Cline-derived in-process dispatcher: service.method with unary + streaming + request-id correlation, over postMessage (VS Code) / IPC (Electron). Same envelope grammar as the broker.', files:['packages/prism-core/src/core/controller/grpc-handler.ts'], docs:[{t:'Seam bridge',u:'daemon/seam-bridge'}]}},
  {id:'bridge', x:520, y:262, kind:'main', label:'Seam bridge', sub:'BrokerForwarder',
    detail:{kind:'main', desc:'Unhandled service.method keys forward to the broker, so the webview’s existing gRPC client transparently reaches brokered services. Wired on both Electron and VS Code. Turns full-managed into a transport flip.', files:['packages/prism-core/src/core/controller/grpc-handler.ts','apps/prism-electron/src/hosts/electron/ElectronIPCBridge.ts'], docs:[{t:'Seam bridge',u:'daemon/seam-bridge'}]}},

  // Broker
  {id:'broker', x:360, y:430, kind:'main', label:'Daemon Broker', sub:'WebSocket :6780 + HTTP /call',
    detail:{kind:'main', desc:'The sovereign multi-service hub. BrokerEnvelope {id,service,method,payload,caps,stream,ts}; WSHello→WSWelcome ships the live registry; HTTP control plane (/services /health /register /deregister /call /pairing); 15s health loop; try-local→cloud.', files:['packages/prism-daemon/src/broker.ts','packages/prism-daemon/services.config.json'], docs:[{t:'Broker core',u:'daemon/broker'},{t:'Overview',u:'daemon/'}]}},
  {id:'mgr', x:660, y:430, kind:'meta', label:'Desktop daemon-manager', sub:'utilityProcess.fork · supervise',
    detail:{kind:'meta', desc:'The Electron desktop spawns + supervises the broker as a child: adopt / spawn / health-poll / crash-restart / version-sync / kill-on-quit. Headless-testable (injected fork/fetch).', files:['apps/prism-electron/src/daemon/daemon-manager.ts'], docs:[{t:'Desktop daemon-manager',u:'daemon/desktop-manager'}]}},

  // Adapters
  {id:'a-ws', x:30,  y:600, kind:'adapter', label:'WebSocketAdapter', sub:'clean dialect',
    detail:{kind:'main', desc:'Generic JSON-over-WebSocket transport for a backend speaking the broker’s clean dialect.', files:['packages/prism-daemon/src/adapters/websocket.ts'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'a-paseo', x:218, y:600, kind:'adapter', label:'PaseoWebSocketAdapter', sub:'websocket-paseo',
    detail:{kind:'main', desc:'Speaks the real paseo daemon’s dialect (hello/welcome + <cmd>_request/_response RPCs + push frames), so agent-run targets the live paseo daemon at :6767. Sovereign absorption, not a dependency.', files:['packages/prism-daemon/src/adapters/paseo-websocket.ts'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'a-rest', x:406, y:600, kind:'adapter', label:'RestAdapter', sub:'config-driven routes',
    detail:{kind:'main', desc:'Multi-route REST. Built for design-gen: lifecycle on the design-studio relay (:7457) + work on the engine (:7456), readiness at /api/skills.', files:['packages/prism-daemon/src/adapters/rest.ts'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'a-mcp', x:594, y:600, kind:'adapter', label:'StdioMcpAdapter', sub:'stdio MCP',
    detail:{kind:'main', desc:'Spawns + speaks to a stdio MCP server. Used by code-intel (codebase-memory-mcp) and knowledge (graphify-mcp).', files:['packages/prism-daemon/src/adapters/stdio-mcp.ts'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'a-flask', x:782, y:600, kind:'adapter', label:'FlaskHttpAdapter', sub:'one adapter, N Flask svcs',
    detail:{kind:'main', desc:'ONE adapter for every Python/Flask backend — 3d-gen, cinopsis, notebooks — parameterized by endpoint + manifest.', files:['packages/prism-daemon/src/adapters/flask-http.ts'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},

  // Services
  {id:'s-agent', x:10,  y:776, kind:'svc', label:'agent-run', sub:'paseo daemon :6767',
    detail:{kind:'svc', desc:'Agent orchestration via the paseo-derived daemon. Full-managed step 1 (AgentRunClient) proves driving it behind the broker — gated by PRISM_AGENTS_BROKERED (default off).', files:['packages/prism-daemon-client/src/agent-run.ts'], docs:[{t:'Full-managed analysis',u:'https://github.com/TheDigitalGriot/prism-plugin/blob/main/.prism/shared/research/2026-06-13-full-managed-capability-parity.md'}]}},
  {id:'s-code', x:170, y:776, kind:'svc', label:'code-intel', sub:'codebase-memory-mcp',
    detail:{kind:'svc', desc:'Code intelligence over the knowledge graph (search_graph, trace_path, get_architecture). Proven ready vs the live MCP binary.', files:['packages/prism-daemon/services.config.json'], docs:[{t:'Overview',u:'daemon/'}]}},
  {id:'s-design', x:330, y:776, kind:'svc', label:'design-gen', sub:'design-studio :7457 → :7456',
    detail:{kind:'svc', desc:'Design generation via the open-design engine behind the design-studio relay. The VS Code panel handlers route here broker-preferred / direct-fallback.', files:['apps/prism-design-studio/'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'s-know', x:490, y:776, kind:'svc', label:'knowledge', sub:'graphify-mcp',
    detail:{kind:'svc', desc:'Knowledge / STORE engine — sovereign fork of Graphify (MIT). Exposes an MCP server (graphify-mcp) over the stdio-mcp adapter; powers the future Synaptiq canvas.', files:['packages/prism-daemon/services.config.json'], docs:[{t:'Overview',u:'daemon/'}]}},
  {id:'s-3d', x:650, y:776, kind:'svc', label:'3d-gen', sub:'Lucid / ComfyUI · try-local→cloud',
    detail:{kind:'svc', desc:'3D generation. The most heterogeneous service: local GGUF on small VRAM, 24GB models route to cloud. The broker’s VRAM gate is the core UX.', files:['packages/prism-daemon/services.config.json'], docs:[{t:'Broker core',u:'daemon/broker'}]}},
  {id:'s-cin', x:810, y:776, kind:'svc', label:'cinopsis', sub:'video → structured',
    detail:{kind:'svc', desc:'Video → structured analysis (Flask). Outputs feed the knowledge graph (multi-modal).', files:['packages/prism-daemon/services.config.json'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},
  {id:'s-nb', x:970, y:776, kind:'svc', label:'notebooks', sub:'Jupyter',
    detail:{kind:'svc', desc:'Jupyter notebooks over the Flask HTTP adapter.', files:['packages/prism-daemon/services.config.json'], docs:[{t:'Adapters',u:'daemon/adapters'}]}},

  // Relay + clients (right column)
  {id:'relay', x:1010, y:262, kind:'meta', label:'@prism/relay', sub:'E2EE · Curve25519 + NaCl',
    detail:{kind:'meta', desc:'Sovereign extraction of paseo’s zero-knowledge relay. The broker dials OUT; remote clients pair via the daemon pubkey (QR). connectRelay({daemonKeyPair}) encrypts every channel.', files:['packages/prism-relay/','packages/prism-daemon/src/relay.ts'], docs:[{t:'E2EE relay',u:'daemon/relay'}]}},
  {id:'c-ts', x:1010, y:430, kind:'meta', label:'@prism/daemon-client', sub:'TS client',
    detail:{kind:'meta', desc:'The TypeScript client for VS Code / Electron / mobile-web. connect/call/stream/onServiceUpdate, with its own minimal protocol mirror (no runtime dep on the broker).', files:['packages/prism-daemon-client/src/client.ts'], docs:[{t:'Surface clients',u:'daemon/clients'}]}},
  {id:'c-go', x:1010, y:600, kind:'meta', label:'cli/daemon (Go)', sub:'coder/websocket',
    detail:{kind:'meta', desc:'Hand-written Go WebSocket client (no Node runtime). Powers `prism-cli daemon ls`. Cross-language conformance proven vs the live TS daemon.', files:['apps/prism-cli/daemon/client.go','apps/prism-cli/cmd_daemon.go'], docs:[{t:'Surface clients',u:'daemon/clients'}]}},

  // Error / edge-case nodes (red)
  {id:'e-fallback', x:520, y:344, kind:'err', label:'daemon down → in-process', sub:'broker-preferred / direct-fallback',
    detail:{kind:'err', desc:'When the broker is unreachable, surfaces fall back to their original direct connection — the panel works with or without the daemon. This is what makes adopting the broker risk-free.', files:['apps/prism-vscode/src/hosts/vscode/PrismPanelProvider.ts'], docs:[{t:'Seam bridge',u:'daemon/seam-bridge'}]}},
  {id:'e-vram', x:650, y:884, kind:'err', label:'VRAM gate fail → cloud', sub:'try-local→cloud',
    detail:{kind:'err', desc:'If the local VRAM gate isn’t met (PRISM_VRAM_GB / nvidia-smi), the broker resolves the cloud endpoint (RunPod / HF) and caches it in the descriptor.', files:['packages/prism-daemon/src/resolve.ts'], docs:[{t:'Broker core',u:'daemon/broker'}]}},
  {id:'e-ver', x:660, y:540, kind:'err', label:'version mismatch → restart', sub:'meta.json sync',
    detail:{kind:'err', desc:'The daemon-manager compares the broker’s /health version against the bundled meta.json and restarts once on mismatch — race-free (detach-first + per-child exit binding).', files:['apps/prism-electron/src/daemon/daemon-manager.ts'], docs:[{t:'Desktop daemon-manager',u:'daemon/desktop-manager'}]}},
];

const EDGES = [
  // surfaces → seam / clients
  ['vscode','grpc','main'], ['electron','grpc','main'], ['cli','c-go','main'], ['mobile','relay','main'],
  ['grpc','bridge','main'], ['bridge','broker','main'],
  // clients → broker
  ['c-ts','broker','main'], ['c-go','broker','main'],
  // broker → adapters
  ['broker','a-ws','main'], ['broker','a-paseo','main'], ['broker','a-rest','main'], ['broker','a-mcp','main'], ['broker','a-flask','main'],
  // adapters → services
  ['a-paseo','s-agent','main'], ['a-mcp','s-code','main'], ['a-mcp','s-know','main'], ['a-rest','s-design','main'],
  ['a-flask','s-3d','main'], ['a-flask','s-cin','main'], ['a-flask','s-nb','main'],
  // supervision / relay (meta, dashed)
  ['mgr','broker','meta'], ['broker','relay','meta'], ['electron','mgr','meta'],
  // errors (red dashed)
  ['bridge','e-fallback','err'], ['s-3d','e-vram','err'], ['mgr','e-ver','err'],
];

const BANDS = [
  {x:0,   y:60,  w:980,  h:96,  lab:'Layer 1', name:'Surfaces'},
  {x:0,   y:228, w:980,  h:96,  lab:'Layer 2', name:'Seam (in-process ⇄ wire)'},
  {x:0,   y:396, w:980,  h:96,  lab:'Layer 3', name:'Daemon Broker · :6780'},
  {x:0,   y:564, w:980,  h:96,  lab:'Layer 4', name:'Adapters'},
  {x:0,   y:732, w:1160, h:108, lab:'Layer 5', name:'Services'},
  {x:992, y:228, w:188,  h:464, lab:'', name:'Relay · Clients'},
];

// ── Render ──
const canvas = document.getElementById('canvas');
const svg = document.getElementById('edges');
const NS = 'http://www.w3.org/2000/svg';
const byId = Object.fromEntries(NODES.map(n=>[n.id,n]));

// bands
for(const b of BANDS){
  const d = document.createElement('div'); d.className='band';
  d.style.cssText=`left:${b.x}px;top:${b.y}px;width:${b.w}px;height:${b.h}px`;
  d.innerHTML = `<div class="blab">${b.lab}</div><div class="bname">${b.name}</div>`;
  canvas.appendChild(d);
}
// nodes
for(const n of NODES){
  const el = document.createElement('div');
  el.className = 'node' + (n.kind==='err'?' err':'');
  el.style.cssText = `left:${n.x}px;top:${n.y}px;width:${N}px`;
  el.dataset.id = n.id;
  el.innerHTML = `<div class="ntag mono">${n.kind}</div><div class="nl">${n.label}</div><div class="ns">${n.sub||''}</div>`;
  el.addEventListener('click', e=>{ e.stopPropagation(); selectNode(n.id); });
  canvas.appendChild(el);
}
// edges
function nodeGeom(id){ const n=byId[id]; const el=[...canvas.children].find(c=>c.dataset&&c.dataset.id===id);
  const h = el? el.offsetHeight : NH; return {x:n.x, y:n.y, w:N, h, cx:n.x+N/2, top:n.y, bot:n.y+h}; }
function drawEdges(){
  svg.innerHTML=''; let maxX=0,maxY=0;
  for(const n of NODES){ maxX=Math.max(maxX,n.x+N); maxY=Math.max(maxY,n.y+NH); }
  for(const b of BANDS){ maxX=Math.max(maxX,b.x+b.w); maxY=Math.max(maxY,b.y+b.h); }
  svg.setAttribute('width', maxX+60); svg.setAttribute('height', maxY+60);
  for(const [from,to,kind] of EDGES){
    const a=nodeGeom(from), z=nodeGeom(to);
    let d;
    if (Math.abs(a.cx - z.cx) < 4 || (z.top > a.bot)) { // vertical-ish, source above target
      const midY=(a.bot+z.top)/2;
      d=`M ${a.cx} ${a.bot} L ${a.cx} ${midY} L ${z.cx} ${midY} L ${z.cx} ${z.top}`;
    } else { // side connection — exit right/left, elbow into target top
      const sx = a.x + a.w, sy = a.y + a.h/2;
      const tx = z.cx, ty = z.top;
      const midX = (sx + tx)/2;
      d=`M ${sx} ${sy} L ${midX} ${sy} L ${midX} ${ty-20} L ${tx} ${ty-20} L ${tx} ${ty}`;
    }
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d',d); p.setAttribute('fill','none');
    p.setAttribute('stroke', kind==='err'?'var(--edge-err)':kind==='meta'?'var(--edge-meta)':'var(--edge)');
    p.setAttribute('stroke-width', kind==='main'?'1.6':'1.4');
    if(kind!=='main') p.setAttribute('stroke-dasharray', kind==='err'?'5 4':'4 5');
    svg.appendChild(p);
    // arrowhead dot at target
    const dot=document.createElementNS(NS,'circle');
    dot.setAttribute('cx', z.cx); dot.setAttribute('cy', z.top); dot.setAttribute('r','2.4');
    dot.setAttribute('fill', kind==='err'?'var(--edge-err)':kind==='meta'?'var(--edge-meta)':'var(--edge)');
    svg.appendChild(dot);
  }
}
drawEdges();

// ── Pan / zoom ──
const vp=document.getElementById('viewport');
let tx=40, ty=20, scale=1;
function apply(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%'; }
apply();
let dragging=false,sx=0,sy=0;
vp.addEventListener('mousedown',e=>{ if(e.target.closest('.node'))return; dragging=true; vp.classList.add('grabbing'); sx=e.clientX-tx; sy=e.clientY-ty; });
window.addEventListener('mousemove',e=>{ if(!dragging)return; tx=e.clientX-sx; ty=e.clientY-sy; apply(); });
window.addEventListener('mouseup',()=>{ dragging=false; vp.classList.remove('grabbing'); });
vp.addEventListener('wheel',e=>{ e.preventDefault();
  const r=vp.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top;
  const ns=Math.min(2.4,Math.max(.25, scale*(e.deltaY<0?1.1:0.9)));
  tx = mx - (mx-tx)*(ns/scale); ty = my - (my-ty)*(ns/scale); scale=ns; apply();
},{passive:false});
function bounds(){ let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const b of BANDS){ x0=Math.min(x0,b.x);y0=Math.min(y0,b.y);x1=Math.max(x1,b.x+b.w);y1=Math.max(y1,b.y+b.h); }
  return {x0,y0,x1,y1}; }
function fit(){ const r=vp.getBoundingClientRect(); const b=bounds();
  const pad=50; const sw=(r.width-pad*2)/(b.x1-b.x0), sh=(r.height-pad*2)/(b.y1-b.y0);
  scale=Math.min(1.4, Math.min(sw,sh)); tx=pad-b.x0*scale + (r.width-pad*2-(b.x1-b.x0)*scale)/2; ty=pad-b.y0*scale; apply(); }
document.getElementById('fit').onclick=fit;
document.getElementById('zin').onclick=()=>{ scale=Math.min(2.4,scale*1.15); apply(); };
document.getElementById('zout').onclick=()=>{ scale=Math.max(.25,scale*0.87); apply(); };
document.getElementById('reset').onclick=()=>{ tx=40;ty=20;scale=1; apply(); closePanel(); };

// ── Detail panel ──
const panel=document.getElementById('panel');
function selectNode(id){
  const n=byId[id]; const d=n.detail||{};
  [...canvas.querySelectorAll('.node')].forEach(el=>el.classList.toggle('sel', el.dataset.id===id));
  document.getElementById('pk').textContent = ({main:'Data flow',svc:'Service',adapter:'Adapter',surface:'Surface',meta:'Infrastructure',err:'Error / edge-case'}[n.kind]||'Node');
  document.getElementById('pt').textContent = n.label;
  const chip = `<span class="chip ${n.kind==='svc'?'svc':n.kind==='meta'?'meta':n.kind==='err'?'err':'main'}">${n.kind}</span>`;
  let html = `<div style="margin-bottom:14px">${chip}<span class="mono" style="font-size:11px;color:var(--mut)">${n.sub||''}</span></div>`;
  html += `<div class="desc">${d.desc||''}</div>`;
  if(d.files&&d.files.length){ html+=`<div class="sec"><h3>Where it lives</h3>`+d.files.map(f=>`<div class="file mono">${f}</div>`).join('')+`</div>`; }
  if(d.docs&&d.docs.length){ html+=`<div class="sec"><h3>Read more</h3>`+d.docs.map(x=>`<a class="doc" href="${x.u}" ${x.u.startsWith('http')?'target="_blank"':''}>→ ${x.t}</a>`).join('')+`</div>`; }
  document.getElementById('pbody').innerHTML=html;
  panel.classList.add('open');
}
function closePanel(){ panel.classList.remove('open'); [...canvas.querySelectorAll('.node')].forEach(el=>el.classList.remove('sel')); }
document.getElementById('pclose').onclick=closePanel;
vp.addEventListener('click',e=>{ if(!e.target.closest('.node')) closePanel(); });
window.addEventListener('keydown',e=>{ if(e.key==='Escape') closePanel(); if(e.key==='f') fit(); });

// initial fit
setTimeout(fit, 60);
</script>
</body>
</html>
