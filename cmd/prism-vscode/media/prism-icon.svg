<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Prism triangle outline -->
  <polygon
    points="12,2 2,20 22,20"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Spectral refraction line -->
  <line x1="12" y1="2" x2="12" y2="20" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Dispersion rays -->
  <line x1="12" y1="11" x2="19" y2="15" stroke="currentColor" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="12" y1="11" x2="17" y2="14" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="12" y1="11" x2="15" y2="13" stroke="currentColor" stroke-width="1" stroke-opacity="0.6"/>
</svg>
